    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
      <path d="M12 20h9M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
  </button>
</header>

<main>

<section id="view-home" class="active">
  <div class="hero">
    <div class="hero-eyebrow" id="hero-eyebrow">il tuo viaggio</div>
    <h1 class="hero-title" id="hero-title">—</h1>
    <div class="hero-zh zh" id="hero-zh"></div>
    <div class="countdown" id="countdown"></div>
  </div>

  <h2 class="section-title">Agenda di viaggio</h2>
  <div class="day-list" id="day-list"></div>
</section>

<section id="view-day">
  <div id="day-detail"></div>
</section>


</main>

<nav class="tabbar" role="tablist" aria-label="Navigazione principale">
  <button class="tab tab-nav active" data-view="home" aria-label="Giorni del viaggio">
    <span class="tab-icon-wrap">
      <svg class="tab-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="5" width="18" height="16" rx="2"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="3" x2="8" y2="7"/>
        <line x1="16" y1="3" x2="16" y2="7"/>
      </svg>
      <span class="tab-icon-cn serif" aria-hidden="true">▦</span>
    </span>
    <span class="tab-label">Giorni</span>
  </button>
  <button class="tab tab-action" id="tab-utilities" onclick="openUtilitiesSheet()" aria-label="Apri utilities: meteo, traduttore, convertitore">
    <span class="tab-icon-wrap">
      <svg class="tab-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      <span class="tab-icon-cn serif" aria-hidden="true">⚙</span>
    </span>
    <span class="tab-label">Utilities</span>
  </button>
  <button class="tab tab-action admin-only" id="tab-expenses" onclick="openExpensesSheet()" aria-label="Spese: inserisci, controlla, convertitore" style="display:none">
    <span class="tab-icon-wrap">
      <svg class="tab-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/>
      </svg>
      <span class="tab-icon-cn serif" aria-hidden="true">€</span>
    </span>
    <span class="tab-label">Spese</span>
  </button>
  <button class="tab tab-account tab-action" id="tab-account" onclick="openAuthSheet()" aria-label="Accedi al tuo account">
    <span class="tab-avatar offline" id="tab-avatar">
      <span class="tab-avatar-dot" aria-hidden="true"></span>
      <svg class="tab-avatar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 21c0-4.5 3.5-8 8-8s8 3.5 8 8"/>
      </svg>
    </span>
    <span class="tab-label" id="tab-account-label">Accedi</span>
  </button>
</nav>

<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script>
// =============================================================
// TRIP DATA — populated by admin, persisted to localStorage + Supabase
// =============================================================
// TRIP holds the metadata of the trip (title, dates, subtitle, etc).
// DAYS is a list of day objects, each with its own country code so the trip
// can span multiple countries. The admin builds these dynamically; the app
// starts empty.
let TRIP = {
  title: "",          // Es: "Giappone · Primavera 2027"
  subtitle: "",       // Sottotitolo locale opzionale, es: "日本"
  startDate: "",      // ISO YYYY-MM-DD
  endDate: ""         // ISO YYYY-MM-DD
};

let DAYS = [];

// =============================================================
// COUNTRY TABLE — used to derive currency, language, timezone, flag, etc.
// Each entry: code (ISO 3166-1 alpha-2), name (Italian), flag (emoji),
// currency (ISO 4217), language (BCP 47 for translator), tz (IANA timezone),
// subtitle (optional native script, used as decorative watermark).

  { code:"BR", name:"Brasile",             flag:"🇧🇷", currency:"BRL", language:"pt",    tz:"America/Sao_Paulo" },
  { code:"CA", name:"Canada",              flag:"🇨🇦", currency:"CAD", language:"en",    tz:"America/Toronto" },
  { code:"CH", name:"Svizzera",            flag:"🇨🇭", currency:"CHF", language:"de",    tz:"Europe/Zurich" },
  { code:"CL", name:"Cile",                flag:"🇨🇱", currency:"CLP", language:"es",    tz:"America/Santiago" },
  { code:"CN", name:"Cina",                flag:"🇨🇳", currency:"CNY", language:"zh-CN", tz:"Asia/Shanghai", subtitle:"中国" },
  { code:"CO", name:"Colombia",            flag:"🇨🇴", currency:"COP", language:"es",    tz:"America/Bogota" },
  { code:"CR", name:"Costa Rica",          flag:"🇨🇷", currency:"CRC", language:"es",    tz:"America/Costa_Rica" },
  { code:"CU", name:"Cuba",                flag:"🇨🇺", currency:"CUP", language:"es",    tz:"America/Havana" },
  { code:"CZ", name:"Repubblica Ceca",     flag:"🇨🇿", currency:"CZK", language:"cs",    tz:"Europe/Prague" },
  { code:"DE", name:"Germania",            flag:"🇩🇪", currency:"EUR", language:"de",    tz:"Europe/Berlin" },
  { code:"DK", name:"Danimarca",           flag:"🇩🇰", currency:"DKK", language:"da",    tz:"Europe/Copenhagen" },
  { code:"EG", name:"Egitto",              flag:"🇪🇬", currency:"EGP", language:"ar",    tz:"Africa/Cairo" },
  { code:"ES", name:"Spagna",              flag:"🇪🇸", currency:"EUR", language:"es",    tz:"Europe/Madrid" },

// Returns a human-readable date range, e.g. "13 ago – 28 ago 2026"
function formatTripDateRange(){
  if(!TRIP.startDate || !TRIP.endDate) return "";
  const s = dateOf(TRIP.startDate), e = dateOf(TRIP.endDate);
  const sFmt = s.toLocaleDateString("it-IT", { day: "numeric", month: "short" }).replace(/\.$/,"");
  const eFmt = e.toLocaleDateString("it-IT", { day: "numeric", month: "short", year: "numeric" }).replace(/\.\s/," ");
  return `${sFmt} – ${eFmt}`;
}

async function checkAdminStatus(){
  // We don't reset IS_ADMIN to false here — we only reset it when we're SURE
  // the user is not admin (no _user, RPC returns false, or RPC fails).
  // Resetting before the RPC call would create a vulnerability window during
  // which clicks would be rejected even for legitimate admins.
  if(!_user){ IS_ADMIN = false; return false; }
  try{
    const sb = await ensureSupabase();
    const { data, error } = await sb.rpc("is_trip_admin");
    if(error) throw error;
    IS_ADMIN = !!data;
  }catch(e){
    console.warn("checkAdminStatus:", e);
    // On network/server error, keep the previous IS_ADMIN value rather than
    // demoting a known admin. The next successful check will correct it.
  }
  return IS_ADMIN;
}

async function bootstrapAuth(){
  if(!isSupabaseConfigured()) return;
  setAccountUI("syncing","Cloud…");
  try{
    const sb = await ensureSupabase();
    const { data: { session } } = await sb.auth.getSession();
    _user = session ? session.user : null;
    await checkAdminStatus();
    await pullFromCloud();
    updateAuthUiLabel();

    sb.auth.onAuthStateChange(async (event, session)=>{
      // TOKEN_REFRESHED fires automatically every hour or so; the user's identity
      // hasn't actually changed, so we should NOT re-run checkAdminStatus (which
      // would briefly clear IS_ADMIN if the RPC fails) and we should NOT pull
      // again from cloud. Just update internal state quietly.
      if(event === "TOKEN_REFRESHED"){
        _user = session ? session.user : null;
        return;
      }
      _user = session ? session.user : null;
      await checkAdminStatus();
      await pullFromCloud();
      if(currentDay !== null) showDay(currentDay); else renderHome();
      updateAuthUiLabel();
    });
  }catch(e){
    console.warn("Supabase non raggiungibile:", e);
    setAccountUI("offline","Solo locale");
  }
}

function collectLocalState(){
  return {
    trip: TRIP,
    days: DAYS,
    photos: PHOTOS,
    heros: HERO_PHOTOS,
    visited: VISITED,
    tickets: TICKETS,
    expenses: EXPENSES,
    steps: STEPS,
    tile: localStorage.getItem(TILE_KEY) || "osm"
  };
}

async function pullFromCloud(){
  try{
    const sb = await ensureSupabase();
    if(!sb) return;
    const { data, error } = await sb.from(SUPABASE_TABLE).select("data").eq("id", SUPABASE_RECORD_ID).maybeSingle();
    if(error) throw error;
    if(data && data.data){
      const cloudState = data.data;
      if(cloudState.trip && typeof cloudState.trip === "object"){
        TRIP = Object.assign({title:"",subtitle:"",startDate:"",endDate:""}, cloudState.trip);
        localStorage.setItem(TRIP_KEY, JSON.stringify(TRIP));
      }
      if(cloudState.days && Array.isArray(cloudState.days)){
        DAYS = cloudState.days;
        localStorage.setItem(STATE_KEY, JSON.stringify(DAYS));
      }
      if(cloudState.photos){ PHOTOS = cloudState.photos; localStorage.setItem(PHOTO_KEY, JSON.stringify(PHOTOS)); }
      if(cloudState.heros){ HERO_PHOTOS = cloudState.heros; localStorage.setItem(HERO_KEY, JSON.stringify(HERO_PHOTOS)); }
      if(cloudState.visited){ VISITED = cloudState.visited; localStorage.setItem(VISITED_KEY, JSON.stringify(VISITED)); }
      if(cloudState.tickets){ TICKETS = cloudState.tickets; localStorage.setItem(TICKETS_KEY, JSON.stringify(TICKETS)); }
      if(cloudState.expenses){ EXPENSES = cloudState.expenses; localStorage.setItem(EXP_KEY, JSON.stringify(EXPENSES)); }
      if(cloudState.steps){ STEPS = cloudState.steps; localStorage.setItem(STEPS_KEY, JSON.stringify(STEPS)); }
      if(cloudState.tile){ localStorage.setItem(TILE_KEY, cloudState.tile); currentTile = cloudState.tile; }
      renderHome();
    }
    localStorage.setItem("trip.lastSync", String(Date.now()));
  }catch(e){
    console.warn("pullFromCloud:", e);
    setAccountUI("offline","Errore sync");
  }
}

function scheduleCloudPush(){
  if(!IS_ADMIN) return;
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(()=> pushToCloud(false), 1200);
}

async function pushToCloud(showFeedback){
  if(!IS_ADMIN || _isPushing) return;
  _isPushing = true;
  try{
    setAccountUI("syncing","Salvo…");
    const sb = await ensureSupabase();
    const payload = collectLocalState();
    const { error } = await sb.from(SUPABASE_TABLE).upsert({
      id: SUPABASE_RECORD_ID,
      data: payload,
      updated_at: new Date().toISOString()
    });
    if(error) throw error;
    localStorage.setItem("trip.lastSync", String(Date.now()));
    updateAuthUiLabel();
    if(showFeedback) showToast("Dati salvati sul cloud");
  }catch(e){
    console.warn("pushToCloud:", e);
    setAccountUI("offline","Errore sync");
    if(showFeedback) showToast("Errore: " + (e.message||e));
  }finally{ _isPushing = false; }
}

async function uploadPhotoToCloud(base64DataUrl){
  if(!IS_ADMIN) return null;
  try{
    const sb = await ensureSupabase();
    const res = await fetch(base64DataUrl);
    const blob = await res.blob();
    const filename = `trip/${Date.now()}-${crypto.randomUUID()}.jpg`;
    const { error } = await sb.storage.from(SUPABASE_BUCKET).upload(filename, blob, {
      cacheControl: "31536000",
      upsert: false,
      contentType: "image/jpeg"
    });
    if(error) throw error;
    const { data } = sb.storage.from(SUPABASE_BUCKET).getPublicUrl(filename);
    return data.publicUrl;
  }catch(e){
    console.warn("uploadPhotoToCloud:", e);
    showToast("Upload foto non riuscito");
    return null;
  }
}

async function deletePhotoFromCloud(url){
  if(!IS_ADMIN || !url || !url.startsWith("http")) return;
  try{
    const sb = await ensureSupabase();
    const marker = `/${SUPABASE_BUCKET}/`;
    const idx = url.indexOf(marker);
    if(idx === -1) return;
    const path = decodeURIComponent(url.slice(idx + marker.length).split("?")[0]);
    await sb.storage.from(SUPABASE_BUCKET).remove([path]);
  }catch(e){ console.warn("deletePhotoFromCloud:", e); }
}

function dateOf(s){
  if(!s) return new Date();
  const [y,m,d]=s.split("-").map(Number);
  return new Date(y,m-1,d);
}
function findToday(){
  for(const d of DAYS){
    const dd = dateOf(d.date);
    if(dd.getTime() === TODAY.getTime()) return d;
  }
  return null;
}
function daysUntil(){
  if(!TRIP.startDate) return -9999;
  const start = dateOf(TRIP.startDate);
  return Math.ceil((start - TODAY)/86400000);

async function copyText(text, label){
  try{
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
    }else{
      const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
      document.body.appendChild(ta);ta.focus();ta.select();
      document.execCommand("copy");document.body.removeChild(ta);
    }
    showToast(label || "Copiato!");
  }catch(e){ showToast("Copia non riuscita"); }
}

function htmlEscape(s){ return String(s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function attrEscape(s){ return String(s||"").replace(/'/g,"&#39;").replace(/"/g,"&quot;"); }
// jsEnc: URL-encode a string AND replace ' with %27 so it's safe inside an inline JS
// onclick="..." attribute that wraps it in single quotes. Always decode with decodeURIComponent.
function jsEnc(s){ return encodeURIComponent(String(s||"")).replace(/'/g, "%27"); }

// === EXCHANGE RATE (foreign currency → EUR) ===
// We cache one rate per currency-code, so the converter can switch between
// the currencies of the trip's countries without re-fetching each time.
const RATE_KEY = "trip.rates"; // shape: { CNY: {eurPer:0.128, fetched:..., source:"live"}, JPY: {...} }
const DEFAULT_RATE = { eurPer: 0, fetched: 0, source: "default" };

function getRates(){
  try{ return JSON.parse(localStorage.getItem(RATE_KEY) || "{}") || {}; }catch(e){ return {}; }
}
function saveRates(rates){ localStorage.setItem(RATE_KEY, JSON.stringify(rates)); }
function getRate(currency){
  if(!currency || currency === "EUR") return { eurPer: 1, fetched: Date.now(), source: "identity" };
  const all = getRates();
  return all[currency] || DEFAULT_RATE;
}

async function refreshRate(currency){
  if(!currency || currency === "EUR") return { eurPer: 1, fetched: Date.now(), source: "identity" };
  const all = getRates();
  const existing = all[currency];
  if(existing && Date.now() - existing.fetched < 6*60*60*1000) return existing;
  try{
    const res = await fetch(`https://api.exchangerate.host/latest?base=${currency}&symbols=EUR`);
    const j = await res.json();
    if(j && j.rates && j.rates.EUR){
      const next = { eurPer: j.rates.EUR, fetched: Date.now(), source: "live" };
      all[currency] = next;
      saveRates(all);
      return next;
    }
  }catch(e){ /* offline: keep cached value */ }
  return existing || DEFAULT_RATE;
}

// Refresh rates for all currencies used in the trip
async function refreshRateIfStale(){
  const currencies = new Set();
  for(const dest of tripDestinations()){
    const c = getCountry(dest.country);
    if(c && c.currency && c.currency !== "EUR") currencies.add(c.currency);
  }
  for(const cur of currencies){ await refreshRate(cur); }
}

function toEur(amount, currency){
  const r = getRate(currency);
  return amount * r.eurPer;
}
function fromEur(eurAmount, currency){
  const r = getRate(currency);
  if(!r.eurPer) return 0;
  return eurAmount / r.eurPer;
}

window.saveDayFromEditor = function(dayIdx){
  if(!requireAdmin()) return;
  const date     = document.getElementById("day-date").value;
  const country  = document.getElementById("day-country").value;
  const city     = (document.getElementById("day-city").value || "").trim();
  const cityLocal= (document.getElementById("day-city-local").value || "").trim();
  const title    = (document.getElementById("day-title").value || "").trim();
  const summary  = (document.getElementById("day-summary").value || "").trim();

  if(!date){ showToast("Inserisci la data"); return; }
  if(!country){ showToast("Scegli il paese di destinazione"); return; }
  if(!city){ showToast("Inserisci la città / località"); return; }
  if(!title){ showToast("Inserisci un titolo per la giornata"); return; }

  // Build dayLabel from the date (Italian short format, like "Mer 13 ago")
  const d = dateOf(date);
  const dayLabel = d.toLocaleDateString("it-IT", { weekday: "short", day: "numeric", month: "short" })
    .replace(/\.$/,'').replace(/^./, c=>c.toUpperCase());

  if(dayIdx === -1){
    // ADD: append at the end with sequential number
    const newN = DAYS.length > 0 ? Math.max(...DAYS.map(x=>x.n)) + 1 : 1;
    DAYS.push({
      n: newN, date, dayLabel, country, city, cityLocal, title, summary,
      stops: [], info: []
    });
  }else{
    // EDIT: update existing day
    const existing = DAYS[dayIdx];
    DAYS[dayIdx] = Object.assign({}, existing, {
      date, dayLabel, country, city, cityLocal, title, summary
    });
  }
  persistDays();
  closeSheet();
  renderHome();
  if(dayIdx !== -1 && currentDay === DAYS[dayIdx].n) showDay(currentDay);
  showToast(dayIdx === -1 ? "Giorno aggiunto" : "Giorno aggiornato");
};

  const d = DAYS[idx];
  const stopCount = (d.stops || []).length;
  const warn = stopCount > 0
    ? `Eliminare il Giorno ${dayN} ("${d.title}") e le sue ${stopCount} tappe?`
    : `Eliminare il Giorno ${dayN} ("${d.title}")?`;
  if(!confirm(warn)) return;

const CURRENCY_SYMBOLS = {
  USD:"$", EUR:"€", GBP:"£", JPY:"¥", CNY:"¥", CHF:"₣", HKD:"$", AUD:"$", CAD:"$",
  NZD:"$", SEK:"kr", NOK:"kr", DKK:"kr", PLN:"zł", CZK:"Kč", HUF:"Ft", RUB:"₽",
  INR:"₹", KRW:"₩", SGD:"$", THB:"฿", VND:"₫", AED:"د.إ", BRL:"R$", MXN:"$",
  ARS:"$", CLP:"$", COP:"$", PEN:"S/", TRY:"₺", ZAR:"R", IDR:"Rp", PHP:"₱",
  MYR:"RM", EGP:"£", ILS:"₪", ISK:"kr", MAD:"DH", JOD:"د", KES:"Sh", TND:"DT",
  TWD:"$", CUP:"$", CRC:"₡", TZS:"Sh", RON:"lei"
};
function currencySymbol(code){ return CURRENCY_SYMBOLS[code] || code; }

// Currently selected currency for the converter (persisted across sheet opens)
let _convCurrency = null;

function _availableConvCurrencies(){
  const seen = new Set();
  const list = [];
  for(const dest of tripDestinations()){
    const c = getCountry(dest.country);
    if(c && c.currency && c.currency !== "EUR" && !seen.has(c.currency)){
      seen.add(c.currency);
      list.push({ code: c.currency, flag: c.flag, country: c.name });
    }
  }
  return list;
}

window.openCurrencyConverter = async function(){
  const currencies = _availableConvCurrencies();
  if(currencies.length === 0){
    showSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-eyebrow">Convertitore</div>
      <h3 class="sheet-title">Nessuna valuta da convertire</h3>
      <p style="font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin:0 0 16px">
        Aggiungi almeno un giorno con un paese fuori dall'eurozona per usare il convertitore.
      </p>
      <button class="sheet-close" onclick="closeSheet()">Chiudi</button>
    `);
    return;
  }
  if(!_convCurrency || !currencies.find(c => c.code === _convCurrency)){
    _convCurrency = currencies[0].code;
  }

  const renderSheet = ()=>{
    const cur = _convCurrency;
    const sym = currencySymbol(cur);
    const r = getRate(cur);
    const rateLabel = r.source === "live"
      ? `1 ${cur} = €${r.eurPer.toFixed(4)}`
      : r.source === "default" ? "Tasso non ancora aggiornato" : `1 ${cur} = €${r.eurPer.toFixed(4)}`;
    const freshness = r.fetched
      ? `Aggiornato ${new Date(r.fetched).toLocaleString("it-IT", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" })}`
      : "In attesa di prima sincronizzazione";

    const picker = currencies.length > 1 ? `
      <div class="bigfield">
        <span class="bigfield-label">Valuta</span>
        <select id="conv-currency" onchange="changeConvCurrency(this.value)">
          ${currencies.map(c=>`<option value="${c.code}" ${c.code===cur?'selected':''}>${c.flag} ${c.code} · ${c.country}</option>`).join("")}
        </select>
      </div>` : '';

    showSheet(`
      <div class="fs-toolbar">
        <button class="fs-close" onclick="closeSheet()" aria-label="Chiudi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="fs-toolbar-title">Convertitore</div>
        <span class="fs-spacer"></span>
      </div>
      <div class="fs-body">
        ${picker}
        <div class="conv-rate-big">
          <div class="conv-rate-big-label">Tasso di cambio</div>
          <div class="conv-rate-big-main">${rateLabel}</div>
          <div class="conv-rate-big-meta">${freshness}</div>
        </div>

        <div class="conv-pair">
          <div class="bigfield">
            <span class="bigfield-label">${cur}</span>
            <div class="amount-field">
              <span class="amount-field-prefix">${sym}</span>
              <input id="conv-from" class="amount-field-input" type="number" inputmode="decimal" oninput="convertFromForeign(this.value)" placeholder="0" autofocus>
            </div>
          </div>

          <div class="conv-arrow">⇅</div>

          <div class="bigfield">
            <span class="bigfield-label">Euro (EUR)</span>
            <div class="amount-field">
              <span class="amount-field-prefix">€</span>
              <input id="conv-eur" class="amount-field-input" type="number" inputmode="decimal" oninput="convertFromEur(this.value)" placeholder="0">
            </div>
          </div>
        </div>
      </div>
      <div class="fs-footer">
        <button class="btn-giant btn-giant-secondary" onclick="closeSheet()">Chiudi</button>
      </div>
    `, { fullscreen: true });
  };
  renderSheet();
  // Refresh in background
  const before = getRate(_convCurrency).fetched;
  await refreshRate(_convCurrency);
  const after = getRate(_convCurrency).fetched;
  if(after !== before && document.getElementById("sheet").classList.contains("show")) renderSheet();
};

window.handlePhotoFile = async function(input){
  const file = input.files && input.files[0];
  if(!file) return;
  showToast("Elaborazione foto…");
  pendingPhoto = await resizeImage(file);
  const prev = $("f-photo-preview");
  prev.style.backgroundImage = `url('${pendingPhoto}')`;
  prev.classList.add("show");
  const btnRow = prev.nextElementSibling;
  if(!btnRow.querySelector(".btn-danger")){
    const remove = document.createElement("button");
    remove.className = "btn btn-danger";
    remove.textContent = "Rimuovi foto";
    remove.onclick = removePhoto;
    btnRow.appendChild(remove);
  }
};

window.removePhoto = function(){
  pendingPhoto = null;
  const prev = $("f-photo-preview");
  prev.style.backgroundImage = "";
  prev.classList.remove("show");
  const btnRow = prev.nextElementSibling;
  const danger = btnRow.querySelector(".btn-danger");
  if(danger) danger.remove();
};

function resizeImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = (e)=>{
      const img = new Image();
      img.onerror = reject;
      img.onload = ()=>{
        const maxW = 900;
        const ratio = Math.min(maxW / img.width, 1);
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", 0.78));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

window.saveStopForm = async function(dayN, stopIdx){
  if(!requireAdmin("Solo gli amministratori possono salvare le tappe")) return;
  const name = $("f-name").value.trim();
  if(!name){ showToast("Il nome è obbligatorio"); return; }
  const zh = $("f-zh").value.trim();
  const py = $("f-py").value.trim();
  const desc = $("f-desc").value.trim();
  const hours = ($("f-hours") ? $("f-hours").value : "").trim();
  const duration = ($("f-duration") ? $("f-duration").value : "").trim();
  const price = ($("f-price") ? $("f-price").value : "").trim();
  const latRaw = $("f-lat").value, lngRaw = $("f-lng").value;
  const lat = latRaw === "" ? null : parseFloat(latRaw);
  const lng = lngRaw === "" ? null : parseFloat(lngRaw);
  const coords = (lat !== null && lng !== null && !isNaN(lat) && !isNaN(lng)) ? [lat, lng] : null;

  const day = DAYS.find(d=>d.n===dayN);
  const newStop = {name, zh, py, desc};
  if(coords) newStop.coords = coords;
  if(hours) newStop.hours = hours;
  if(duration) newStop.duration = duration;
  if(price) newStop.price = price;

  if(stopIdx === -1){
    day.stops.push(newStop);
  }else{
    // delete old photo/ticket/visited keys if name changed (migrate them)
    const oldName = day.stops[stopIdx].name;
    if(oldName !== name){
      const oldPK = photoKey(dayN, oldName);
      if(PHOTOS[oldPK]){ PHOTOS[photoKey(dayN, name)] = PHOTOS[oldPK]; delete PHOTOS[oldPK]; }
      const oldTK = ticketKey(dayN, oldName);
      if(TICKETS[oldTK]){ TICKETS[ticketKey(dayN, name)] = TICKETS[oldTK]; delete TICKETS[oldTK]; persistTickets(); }
      const oldVK = visitedKey(dayN, oldName);
      if(VISITED[oldVK]){ VISITED[visitedKey(dayN, name)] = VISITED[oldVK]; delete VISITED[oldVK]; persistVisited(); }
    }
    day.stops[stopIdx] = newStop;
  }

  // save photo
  const pkey = photoKey(dayN, name);
  if(pendingPhoto){
    let photoValue = pendingPhoto;
    // If logged in and photo is a data URL (newly added), upload to Storage and store URL instead
    if(_user && typeof pendingPhoto === "string" && pendingPhoto.startsWith("data:")){
      showToast("Carico foto sul cloud…");
      const url = await uploadPhotoToCloud(pendingPhoto);
      if(url){
        photoValue = url;
      }
      // If upload failed, fall back to base64 (still works locally)
    }
    PHOTOS[pkey] = photoValue;
  }else{
    // If we're removing a photo that was on the cloud, clean up
    const old = PHOTOS[pkey];
    if(_user && old && typeof old === "string" && old.startsWith("http")){
      deletePhotoFromCloud(old);
    }
    delete PHOTOS[pkey];
  }

  try{
    persistDays();
    persistPhotos();
  }catch(e){
    if(e.name === "QuotaExceededError"){
      showToast("Spazio esaurito: rimuovi qualche foto");
      return;
    }
    showToast("Errore di salvataggio");
    return;
  }

  pendingPhoto = null;
  closeSheet();
  showDay(dayN);
  showToast(stopIdx === -1 ? "Tappa aggiunta" : "Modifiche salvate");
};

window.moveStopAcross = function(fromDayN, stopIdx, toDayN){
  if(!requireAdmin("Solo gli amministratori possono spostare tappe")) return;
  if(fromDayN === toDayN) return;
  const fromDay = DAYS.find(d=>d.n===fromDayN);
  const toDay   = DAYS.find(d=>d.n===toDayN);
  if(!fromDay || !toDay) return;
  const stop = fromDay.stops[stopIdx];
  if(!stop) return;
  const stopName = stop.name;

  // Move stop object
  fromDay.stops.splice(stopIdx, 1);
  toDay.stops.push(stop);
  persistDays();

  // Migrate associated state (photos / tickets / visited): keys are dayN::stopName
  const oldPK = photoKey(fromDayN, stopName), newPK = photoKey(toDayN, stopName);
  if(PHOTOS[oldPK]){ PHOTOS[newPK] = PHOTOS[oldPK]; delete PHOTOS[oldPK]; persistPhotos(); }

  const oldTK = ticketKey(fromDayN, stopName), newTK = ticketKey(toDayN, stopName);
  if(TICKETS[oldTK]){ TICKETS[newTK] = TICKETS[oldTK]; delete TICKETS[oldTK]; persistTickets(); }

  const oldVK = visitedKey(fromDayN, stopName), newVK = visitedKey(toDayN, stopName);
  if(VISITED[oldVK]){ VISITED[newVK] = VISITED[oldVK]; delete VISITED[oldVK]; persistVisited(); }

  closeSheet();
  showDay(fromDayN);
  showToast(`Spostata al Giorno ${toDayN}`);
};

// =============================================================
// MAP RENDERING
// =============================================================
function haversine(lat1, lng1, lat2, lng2){
  const R = 6371;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// WGS-84 → GCJ-02 conversion (needed when using Amap tiles which are in GCJ-02)
function wgs84ToGcj02(lat, lng){
  const a = 6378245.0, ee = 0.00669342162296594323;
  function tLat(x,y){
    let r = -100 + 2*x + 3*y + 0.2*y*y + 0.1*x*y + 0.2*Math.sqrt(Math.abs(x));
    r += (20*Math.sin(6*x*Math.PI) + 20*Math.sin(2*x*Math.PI)) * 2/3;
    r += (20*Math.sin(y*Math.PI) + 40*Math.sin(y/3*Math.PI)) * 2/3;
    r += (160*Math.sin(y/12*Math.PI) + 320*Math.sin(y*Math.PI/30)) * 2/3;
    return r;
  }
  function tLng(x,y){
    let r = 300 + x + 2*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x));
    r += (20*Math.sin(6*x*Math.PI) + 20*Math.sin(2*x*Math.PI)) * 2/3;
    r += (20*Math.sin(x*Math.PI) + 40*Math.sin(x/3*Math.PI)) * 2/3;
    r += (150*Math.sin(x/12*Math.PI) + 300*Math.sin(x/30*Math.PI)) * 2/3;
    return r;
  }
  // Outside China — no offset
  if(lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271) return [lat, lng];
  let dLat = tLat(lng-105, lat-35), dLng = tLng(lng-105, lat-35);
  const radLat = lat / 180 * Math.PI;
  let m = Math.sin(radLat); m = 1 - ee*m*m;
  const sqM = Math.sqrt(m);
  dLat = (dLat*180) / ((a*(1-ee))/(m*sqM)*Math.PI);
  dLng = (dLng*180) / (a/sqM*Math.cos(radLat)*Math.PI);
  return [lat+dLat, lng+dLng];
}

const TILE_KEY = "trip.tile";
let mapInstance = null;
let mapTileLayer = null;
let currentTile = localStorage.getItem(TILE_KEY) || "osm";

const TILE_PROVIDERS = {
  osm: {
    label: "OpenStreetMap",
    short: "OSM",
    url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    attribution: "© OpenStreetMap",
    maxZoom: 18,
    needsGcj02: false
  },
  amap: {
    label: "Amap 高德",
    short: "高德",
    url: "https://wprd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=7&x={x}&y={y}&z={z}",
    subdomains: "1234",
    attribution: "© AutoNavi",
    maxZoom: 18,
    needsGcj02: true
  }
};

function renderMap(stops){
  const valid = stops.map((s,i)=>({s, i})).filter(o => o.s.coords && Array.isArray(o.s.coords) && o.s.coords.length===2 && o.s.coords[0] && o.s.coords[1]);
  if(valid.length < 1) return "";

  // total distance
  let totalKm = 0;
  for(let i=1;i<valid.length;i++){
    const a = valid[i-1].s.coords, b = valid[i].s.coords;
    totalKm += haversine(a[0], a[1], b[0], b[1]);
  }

  // Render container — Leaflet will be initialized after DOM mount
  const validJSON = encodeURIComponent(JSON.stringify(valid));

  // Schedule init after DOM is available
  setTimeout(()=> initLeafletMap(valid), 80);

  return `
    <div class="day-map">
      <div class="day-map-header">
        <span>Mappa del giorno · ${valid.length} ${valid.length===1?'tappa':'tappe'}</span>
        <span>~${totalKm.toFixed(1)} km</span>
      </div>
      <div id="day-map-container" class="day-map-leaflet"></div>
      <div class="day-map-tile-switch" role="tablist">
        <button class="day-map-tile-btn ${currentTile==='osm'?'active':''}" onclick="setTile('osm')">OpenStreetMap</button>
        <button class="day-map-tile-btn ${currentTile==='amap'?'active':''}" onclick="setTile('amap')">Amap 高德</button>
        <button class="day-map-tile-btn ${currentTile==='schema'?'active':''}" onclick="setTile('schema')">Schema offline</button>
      </div>
      <div class="day-map-legend">Tocca un numero per andare alla tappa</div>
    </div>`;
}

function initLeafletMap(valid){
  const el = document.getElementById('day-map-container');
  if(!el) return;

  // Tear down previous instance
  if(mapInstance){ mapInstance.remove(); mapInstance = null; mapTileLayer = null; }

  if(currentTile === "schema"){
    // Render SVG schematic into the container
    el.classList.add("schema-mode");
    el.innerHTML = renderSchemaInside(valid);
    return;
  }
  el.classList.remove("schema-mode");
  el.innerHTML = "";  // clear

  const tile = TILE_PROVIDERS[currentTile] || TILE_PROVIDERS.osm;
  const projectCoord = (lat, lng) => tile.needsGcj02 ? wgs84ToGcj02(lat, lng) : [lat, lng];

  const latlngs = valid.map(o => projectCoord(o.s.coords[0], o.s.coords[1]));

  mapInstance = L.map(el, {
    zoomControl: true,
    attributionControl: true,
    preferCanvas: false
  });

  const tileOpts = { attribution: tile.attribution, maxZoom: tile.maxZoom };
  if(tile.subdomains) tileOpts.subdomains = tile.subdomains;
  mapTileLayer = L.tileLayer(tile.url, tileOpts).addTo(mapInstance);

  // Markers
  valid.forEach((o, idx) => {
    const num = o.i + 1;
    const ll = latlngs[idx];
    const icon = L.divIcon({
      className: 'numbered-marker',
      html: `<div class="marker-bubble">${num}</div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 14]
    });
    const marker = L.marker(ll, { icon }).addTo(mapInstance);
    const popupHtml = `<b>${num}. ${htmlEscape(o.s.name)}</b>${o.s.zh ? `<br><span style="color:#8B1A1A">${htmlEscape(o.s.zh)}</span>` : ''}<br><a href="javascript:scrollToStop(${o.i});" style="color:#a37b2a">→ vai alla tappa</a>`;
    marker.bindPopup(popupHtml);
  });

  // Path
  if(latlngs.length > 1){
    L.polyline(latlngs, {
      color: '#a83333', weight: 3, opacity: 0.7, dashArray: '6,8'
    }).addTo(mapInstance);
  }

  // Fit
  if(latlngs.length === 1){
    mapInstance.setView(latlngs[0], 14);
  }else{
    mapInstance.fitBounds(latlngs, { padding: [25, 25] });
  }
}

window.setTile = function(type){
  currentTile = type;
  try{ localStorage.setItem(TILE_KEY, type); }catch(e){}
  // Update active class
  document.querySelectorAll('.day-map-tile-btn').forEach(b => b.classList.remove('active'));
  const evt = window.event;
  if(evt && evt.target) evt.target.classList.add('active');
  // Re-render current day's map
  if(currentDay !== null){
    const day = DAYS.find(d=>d.n===currentDay);
    if(day){
      const valid = day.stops.map((s,i)=>({s, i})).filter(o => o.s.coords && Array.isArray(o.s.coords) && o.s.coords.length===2 && o.s.coords[0] && o.s.coords[1]);
      if(valid.length >= 1) initLeafletMap(valid);
    }
  }
};

// SVG schematic (used as offline fallback)
function renderSchemaInside(valid){
  const lats = valid.map(o => o.s.coords[0]);
  const lngs = valid.map(o => o.s.coords[1]);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const padLat = Math.max((maxLat - minLat) * 0.18, 0.003);
  const padLng = Math.max((maxLng - minLng) * 0.18, 0.003);
  const lat0 = minLat - padLat, lat1 = maxLat + padLat;
  const lng0 = minLng - padLng, lng1 = maxLng + padLng;
  const W = 320, H = 200;
  const project = (lat, lng) => [
    ((lng - lng0) / (lng1 - lng0)) * W,
    H - ((lat - lat0) / (lat1 - lat0)) * H
  ];
  const points = valid.map(o => project(o.s.coords[0], o.s.coords[1]));
  const pathD = points.map((p,i) => `${i===0?'M':'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  const pinsSvg = points.map(([x,y], i) => `
    <g class="pin-group" transform="translate(${x.toFixed(1)},${y.toFixed(1)})" onclick="scrollToStop(${valid[i].i})">
      <ellipse class="pin-shadow" cx="0" cy="2" rx="11" ry="3"/>
      <circle class="pin-bg" r="11"/>
      <text class="pin-text" y="4" text-anchor="middle" font-size="12">${valid[i].i + 1}</text>
    </g>`).join("");
  let gridLines = "";
  for(let gx=0; gx<=W; gx+=20){ gridLines += `<line class="grid" x1="${gx}" y1="0" x2="${gx}" y2="${H}"/>`; }
  for(let gy=0; gy<=H; gy+=20){ gridLines += `<line class="grid" x1="0" y1="${gy}" x2="${W}" y2="${gy}"/>`; }
  return `
    <svg class="day-map-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="height:280px">
      ${gridLines}
      <g transform="translate(${W-20},20)">
        <circle class="compass-bg" r="9"/>
        <polygon class="compass-arrow" points="0,-7 -2,0 2,0"/>
        <text class="compass-text" y="-2" text-anchor="middle">N</text>
      </g>
      <path class="path" d="${pathD}"/>
      ${pinsSvg}
    </svg>`;
}

// Returns unique destinations from the days, each with city, country, coords.
function tripDestinations(){
  const seen = new Map();
  for(const d of DAYS){
    if(!d.country || !d.city) continue;
    const key = `${d.country}|${d.city}`;
    if(!seen.has(key)){
      // Try to find coords from any stop on this day
      let coords = null;
      for(const s of (d.stops||[])){
        if(s.coords && s.coords.length === 2 && s.coords[0] && s.coords[1]){ coords = s.coords; break; }
      }
      seen.set(key, { city: d.city, cityLocal: d.cityLocal || "", country: d.country, coords, dayCount: 1 });
    }else{
      seen.get(key).dayCount += 1;
    }
  }
  // Sort by day count (most visited first), cap at 5
  return Array.from(seen.values()).sort((a,b)=> b.dayCount - a.dayCount).slice(0, 5);
}

// Returns the most "important" country of the trip (first by day count), or null
function primaryDestination(){
  const dests = tripDestinations();
  if(dests.length === 0) return null;
  return getCountry(dests[0].country);
}

// Returns the country shown by the current view (day-detail if active, otherwise primary)
function activeDestination(){
  if(currentDay !== null){
    const d = DAYS.find(x=>x.n === currentDay);
    if(d && d.country) return getCountry(d.country);
  }
  return primaryDestination();
}

// === WEATHER SHEET — uses the trip's actual destinations ===
async function fetch7DayForecast(lat, lng){
  const cache = getWeatherCache();
  const key = `7d.${lat.toFixed(2)},${lng.toFixed(2)}`;
  const cached = cache[key];
  if(cached && (Date.now() - cached.fetched < 6*60*60*1000)) return cached.data;
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code&forecast_days=8&timezone=auto`;
    const res = await fetch(url);
    if(!res.ok) return null;
    const j = await res.json();
    if(j && j.daily){
      cache[key] = { data: j.daily, fetched: Date.now() };
      setWeatherCache(cache);
      return j.daily;
    }
  }catch(e){ /* offline */ }
  return null;
}

      <div class="fs-footer">

      </div>
    `, { fullscreen: true });
  };
  renderShell(`<div class="weather-loading-big">Caricamento previsioni…</div>`);

  const daily = await fetch7DayForecast(city.coords[0], city.coords[1]);
  const body = document.getElementById("weather-detail-body");
  if(!body) return;

  if(!daily){
    body.innerHTML = `
      <div class="weather-fallback-big">
        <div class="weather-fallback-emoji">🌡️</div>
        <h3>Previsioni live non disponibili</h3>

        <p class="weather-fallback-desc">Riprova quando avrai connessione internet, o avvicinandoti alla data del viaggio.</p>
      </div>`;
    return;
  }

  const days = daily.time.map((dateStr, i)=>{
    const d = new Date(dateStr + "T00:00:00");
    const isToday = i === 0;
    const wd = isToday ? "Oggi" : d.toLocaleDateString("it-IT", { weekday: "long" });
    const dm = d.toLocaleDateString("it-IT", { day: "numeric", month: "long" });
    const code = (daily.weather_code && daily.weather_code[i]) || 0;
    const tmax = Math.round(daily.temperature_2m_max[i]);
    const tmin = Math.round(daily.temperature_2m_min[i]);
    const rain = (daily.precipitation_probability_max && daily.precipitation_probability_max[i]) || 0;
    return `
      <div class="weather-big-row${isToday ? ' is-today' : ''}">
        <div class="weather-big-when">
          <div class="weather-big-wd">${wd}</div>
          <div class="weather-big-dm">${dm}</div>
        </div>
        <div class="weather-big-mid">
          <div class="weather-big-icon">${weatherIcon(code)}</div>
          <div class="weather-big-desc">${weatherDesc(code)}</div>
          ${rain >= 10 ? `<div class="weather-big-rain">💧 ${rain}% pioggia</div>` : ''}
        </div>
        <div class="weather-big-temp">
          <div class="weather-big-tmax">${tmax}°</div>
          <div class="weather-big-tmin">${tmin}°</div>
        </div>
      </div>`;
  }).join("");
  body.innerHTML = `<div class="weather-big-list">${days}</div>`;
};

// === TRANSLATOR — MyMemory API + deep-links to external apps ===
// Source language is always Italian. Target language is one of the trip's countries.
// _translatorTargetLang holds the active BCP 47 language code (e.g. "zh-CN", "ja").
// _translatorDir is "it-to" (Italian → target) or "to-it" (target → Italian).
let _translatorTargetLang = null;
let _translatorDir = "it-to";
let _translatorLastResult = null;

// Initialize the target language from the trip if not yet chosen
function _initTranslatorTarget(){
  if(_translatorTargetLang) return;
  const primary = primaryDestination();
  if(primary && primary.language !== "it"){
    _translatorTargetLang = primary.language;
  }
}

// Available target languages = unique languages from the trip's countries (excluding Italian)
function _availableTargetLangs(){
  const seen = new Set();
  const langs = [];
  for(const dest of tripDestinations()){
    const c = getCountry(dest.country);
    if(c && c.language !== "it" && !seen.has(c.language)){
      seen.add(c.language);
      langs.push({ code: c.language, name: languageName(c.language), flag: c.flag });
    }
  }
  return langs;
}

async function callMyMemory(text, fromLang, toLang){
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|${toLang}&de=traveler@example.com`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("Errore di rete (HTTP " + res.status + ")");
  const j = await res.json();
  if(j && j.responseStatus !== 200 && j.responseStatus !== "200"){
    throw new Error(j.responseDetails || "Errore del servizio");
  }
  const out = j && j.responseData && j.responseData.translatedText;
  if(!out) throw new Error("Nessuna traduzione restituita");
  return out;
}

// Returns true if a script is "CJK" (likely needs large display)
function _isCJK(code){
  return code === "zh-CN" || code === "zh-HK" || code === "zh-TW" || code === "ja" || code === "ko";
}

window.openTranslatorSheet = function(){
  _initTranslatorTarget();
  const targets = _availableTargetLangs();

  if(targets.length === 0){
    showSheet(`
      <div class="sheet-handle"></div>
      <div class="sheet-eyebrow">Traduttore</div>
      <h3 class="sheet-title">Nessuna lingua da tradurre</h3>
      <p style="font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin:0 0 16px">
        Aggiungi almeno un giorno con paese di destinazione diverso dall'Italia per usare il traduttore.
      </p>
      <button class="sheet-close" onclick="closeSheet()">Chiudi</button>
    `);
    return;
  }

  // If current target is not in the available list, pick the first one
  if(!targets.find(t=> t.code === _translatorTargetLang)){
    _translatorTargetLang = targets[0].code;
  }

  const targetInfo = targets.find(t=> t.code === _translatorTargetLang);
  const targetLabel = targetInfo ? targetInfo.name : _translatorTargetLang;
  const dir = _translatorDir;
  const fromLabel = dir === "it-to" ? "Italiano" : targetLabel;
  const inputClass = (dir === "to-it" && _isCJK(_translatorTargetLang)) ? "translator-input zh" : "translator-input";
  const inputPlaceholder = dir === "it-to"
    ? "Scrivi in italiano…\nes. \"Quanto costa?\""
    : "Scrivi nella lingua di destinazione…";

  // Picker shown only if more than one target language available
  const langPickerHtml = targets.length > 1 ? `
    <div class="bigfield">
      <span class="bigfield-label">Lingua di destinazione</span>
      <select id="translator-target" onchange="changeTranslatorTarget(this.value)">
        ${targets.map(t=>`<option value="${t.code}" ${t.code===_translatorTargetLang?'selected':''}>${t.flag} ${t.name}</option>`).join("")}
      </select>
    </div>` : '';

  showSheet(`
    <div class="fs-toolbar">
      <button class="fs-close" onclick="closeSheet()" aria-label="Chiudi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="fs-toolbar-title">Traduttore</div>
      <span class="fs-spacer"></span>
    </div>
    <div class="fs-body">
      ${langPickerHtml}
      <div class="translator-direction" role="tablist" aria-label="Direzione di traduzione">
        <button class="translator-dir-btn ${dir==='it-to'?'active':''}" onclick="switchTranslatorDir('it-to')" role="tab" aria-selected="${dir==='it-to'}">Italiano → ${htmlEscape(targetLabel)}</button>
        <button class="translator-dir-btn ${dir==='to-it'?'active':''}" onclick="switchTranslatorDir('to-it')" role="tab" aria-selected="${dir==='to-it'}">${htmlEscape(targetLabel)} → Italiano</button>
      </div>

      <div class="bigfield">
        <span class="bigfield-label">${htmlEscape(fromLabel)}</span>
        <textarea id="translator-input" class="${inputClass}" placeholder="${htmlEscape(inputPlaceholder)}" autofocus></textarea>
      </div>

      <button class="btn-giant" onclick="runTranslation()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        Traduci
      </button>

      <div id="translator-output" class="translator-output-wrap" aria-live="polite"></div>

      <div class="translator-info">
        <b>ℹ️ Sul traduttore</b>
        <p>La traduzione "veloce" qui dentro usa MyMemory: utile per parole singole o frasi semplici, ma non sempre accurata. Per traduzioni precise, apri Microsoft Translator (Bing) qui sotto.</p>
      </div>
    </div>
    <div class="fs-footer">
      <button class="btn-giant btn-giant-secondary" onclick="closeSheet()">Chiudi</button>
    </div>
  `, { fullscreen: true });

  if(_translatorLastResult && _translatorLastResult.dir === dir && _translatorLastResult.target === _translatorTargetLang){
    const inp = document.getElementById("translator-input");
    if(inp) inp.value = _translatorLastResult.input;
    renderTranslationResult(_translatorLastResult.output, _translatorLastResult.input, dir);
  }
};

window.changeTranslatorTarget = function(newLang){
  if(newLang === _translatorTargetLang) return;
  _translatorTargetLang = newLang;
  _translatorLastResult = null;
  openTranslatorSheet();
};

window.switchTranslatorDir = function(newDir){
  if(newDir === _translatorDir) return;
  const inp = document.getElementById("translator-input");
  const currentText = inp ? inp.value : "";
  _translatorDir = newDir;
  _translatorLastResult = null;
  openTranslatorSheet();
  setTimeout(()=>{
    const inp2 = document.getElementById("translator-input");
    if(inp2 && currentText) inp2.value = currentText;
  }, 30);
};

window.runTranslation = async function(){
  const inp = document.getElementById("translator-input");
  const out = document.getElementById("translator-output");
  if(!inp || !out) return;
  const text = (inp.value || "").trim();
  if(!text){ showToast("Scrivi qualcosa da tradurre"); return; }
  if(text.length > 500){ showToast("Massimo 500 caratteri"); return; }

  const fromLang = _translatorDir === "it-to" ? "it" : _translatorTargetLang;
  const toLang   = _translatorDir === "it-to" ? _translatorTargetLang : "it";

  out.innerHTML = `<div class="translator-loading">Traduzione in corso…</div>`;
  try{
    const translated = await callMyMemory(text, fromLang, toLang);
    _translatorLastResult = { input: text, output: translated, dir: _translatorDir, target: _translatorTargetLang };
    renderTranslationResult(translated, text, _translatorDir);
  }catch(err){
    out.innerHTML = `
      <div class="translator-error">
        <b>Traduzione non disponibile</b>
        <p>${htmlEscape(err.message || "Errore sconosciuto")}. Forse sei offline o hai esaurito la quota giornaliera (5000 caratteri/giorno).</p>
        <p style="margin-top:8px">Puoi comunque aprire un'app dedicata qui sotto:</p>
        ${renderExternalAppButtons(text, _translatorDir)}
      </div>`;
  }
};

function renderTranslationResult(translated, sourceText, dir){
  const out = document.getElementById("translator-output");
  if(!out) return;
  // The output is in the target language when dir is "it-to"; show big if CJK
  const outputIsTargetLang = dir === "it-to";
  const showBig = outputIsTargetLang && _isCJK(_translatorTargetLang);
  const outClass = showBig ? "translator-result-text zh translator-result-zh" : "translator-result-text";

  out.innerHTML = `
    <div class="translator-result">
      <div class="translator-result-label">Traduzione</div>
      <div class="${outClass}">${htmlEscape(translated)}</div>
      <div class="translator-result-actions">
        <button class="btn-giant" onclick="copyText('${attrEscape(translated)}', 'Traduzione copiata')">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>
          Copia
        </button>
        ${outputIsTargetLang ? `
          <button class="btn-giant btn-giant-secondary" onclick='openBigChinese({eyebrow:"Traduzione",italian:${JSON.stringify(sourceText)},zh:${JSON.stringify(translated)},hint:"Mostra lo schermo a chi devi parlare."})'>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2z"/><line x1="7" y1="11" x2="17" y2="11"/></svg>
            Mostra grande
          </button>` : ''}
      </div>
    </div>
    <div class="translator-external">
      <div class="translator-external-label">Per traduzioni più precise</div>
      ${renderExternalAppButtons(sourceText, dir)}
    </div>
  `;
}

// External-app deep-links: Microsoft Translator (always); Pleco (only when target is Chinese)
function renderExternalAppButtons(text, dir){
  // Bing Translator language code mapping (some special cases)
  const bingLangs = { "zh-CN":"zh-Hans", "zh-HK":"yue", "zh-TW":"zh-Hant" };
  const targetBing = bingLangs[_translatorTargetLang] || _translatorTargetLang;
  const fromCode = dir === "it-to" ? "it" : targetBing;
  const toCode   = dir === "it-to" ? targetBing : "it";
  const bingUrl  = `https://www.bing.com/translator?text=${encodeURIComponent(text)}&from=${fromCode}&to=${toCode}`;

  // Pleco only makes sense for Chinese
  const isTargetChinese = _translatorTargetLang && _translatorTargetLang.startsWith("zh");
  const plecoText = (isTargetChinese && dir === "to-it") ? text : "";
  const plecoUrl = plecoText ? `plecoapi://x-callback-url/s?q=${encodeURIComponent(plecoText)}` : null;

  return `
    <div class="translator-external-buttons">
      <a class="translator-ext-btn" href="${bingUrl}" target="_blank" rel="noopener">
        <span class="translator-ext-icon">🔤</span>
        <span class="translator-ext-text">
          <b>Microsoft Translator</b>
          <small>Funziona globalmente, anche in Cina senza VPN</small>
        </span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M7 7h10v10"/></svg>
      </a>
      ${plecoUrl ? `
        <a class="translator-ext-btn" href="${plecoUrl}">
          <span class="translator-ext-icon">📚</span>
          <span class="translator-ext-text">
            <b>Pleco</b>
            <small>Dizionario cinese di riferimento</small>
          </span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M7 7h10v10"/></svg>
        </a>
      ` : ''}
    </div>
  `;
}

  closeSheet();
  showToast("Spesa salvata");
  // If we were viewing the day this expense was added to, refresh it
  if(currentDay !== null && currentDay === dayKey) showDay(currentDay);
};

// === EXPENSE REVIEW — full-screen overview of all expenses ===
window.openExpenseReview = function(){
  if(!requireAdmin("Solo l'amministratore può vedere il riepilogo spese")) return;
  // Gather all expenses across all days, sorted chronologically
  const all = [];
  Object.keys(EXPENSES).forEach(k=>{
    const dayKey = k === "general" ? "general" : parseInt(k, 10);
    (EXPENSES[k] || []).forEach((e, idx)=>{
      all.push({ ...e, dayKey, idx });
    });
  });
  all.sort((a,b)=> (a.ts || 0) - (b.ts || 0));

  const total = all.reduce((s, e)=> s + (e.amount || 0), 0);

  // Breakdown per category
  const byCat = {};
  EXPENSE_CATS.forEach(c=>{ byCat[c.id] = 0; });
  all.forEach(e=>{ byCat[e.cat] = (byCat[e.cat] || 0) + (e.amount || 0); });
  const catBars = EXPENSE_CATS
    .filter(c=> byCat[c.id] > 0)
    .sort((a,b)=> byCat[b.id] - byCat[a.id])
    .map(c=>{
      const amt = byCat[c.id];
      const pct = total > 0 ? (amt / total * 100) : 0;
      return `
        <div class="cat-bar-row">
          <span class="cat-bar-icon">${c.icon}</span>
          <div class="cat-bar-body">
            <div class="cat-bar-meta">
              <span class="cat-bar-label">${c.label}</span>
              <span class="cat-bar-amt">€${amt.toFixed(2)} · ${pct.toFixed(0)}%</span>
            </div>
            <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
          </div>
        </div>`;
    }).join("");

  // Chronological list of all entries
  const rows = all.length === 0 ? `
    <div class="expenses-empty">Nessuna spesa registrata. Inseriscine una dalla schermata precedente.</div>
  ` : all.map(e=>{
    const cat = EXPENSE_CATS.find(c=>c.id===e.cat) || EXPENSE_CATS[5];
    const dayLabel = e.dayKey === "general"
      ? "Generale"
      : (function(){ const d = DAYS.find(x=>x.n===e.dayKey); return d ? `Giorno ${d.n} · ${d.city}` : `Giorno ${e.dayKey}`; })();
    const ts = e.ts ? new Date(e.ts).toLocaleDateString("it-IT", { day: "numeric", month: "short" }) : "";
    return `
      <div class="review-row">
        <span class="review-cat">${cat.icon}</span>
        <div class="review-text">
          <div class="review-note">${htmlEscape(e.note || cat.label)}</div>
          <div class="review-meta">${htmlEscape(dayLabel)}${ts ? ' · '+ts : ''}</div>
        </div>
        <div class="review-amt">
          <div class="review-amt-cny">€${(e.amount||0).toFixed(2)}</div>
        </div>
        ${IS_ADMIN ? `<button class="review-del" onclick="deleteExpenseFromReview('${e.dayKey}', ${e.idx})" aria-label="Elimina spesa">×</button>` : ''}
      </div>`;
  }).join("");

  showSheet(`
    <div class="fs-toolbar">
      <button class="fs-close" onclick="closeSheet()" aria-label="Chiudi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="fs-toolbar-title">Riepilogo spese</div>
      <span class="fs-spacer"></span>
    </div>
    <div class="fs-body">
      <div class="review-total-card">
        <div class="review-total-label">Totale viaggio</div>
        <div class="review-total-cny">€${total.toFixed(2)}</div>
        <div class="review-total-meta">${all.length} ${all.length === 1 ? 'voce' : 'voci'}</div>
      </div>
      ${catBars ? `
        <div>
          <div class="review-section-title">Per categoria</div>
          <div class="cat-bars">${catBars}</div>
        </div>` : ''}
      <div>
        <div class="review-section-title">Storico</div>
        <div class="review-list">${rows}</div>
      </div>
    </div>
    <div class="fs-footer">
      <button class="btn-giant" onclick="openExpenseInsert()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuova spesa
      </button>
      <button class="btn-giant btn-giant-secondary" onclick="closeSheet()">Chiudi</button>
    </div>
  `, { fullscreen: true });
};

window.deleteExpenseFromReview = function(dayKeyStr, idx){
  if(!requireAdmin("Solo l'amministratore può eliminare spese")) return;
  if(!confirm("Eliminare questa spesa?")) return;
  const dayKey = dayKeyStr === "general" ? "general" : parseInt(dayKeyStr, 10);
  if(!EXPENSES[dayKey]) return;
  EXPENSES[dayKey].splice(idx, 1);
  if(EXPENSES[dayKey].length === 0) delete EXPENSES[dayKey];
  persistExpenses();
  // Re-render the review sheet
  openExpenseReview();
};

// === LIVE CLOCKS (IT + destination country) ===
function fmtClock(date, tz){
  return new Intl.DateTimeFormat("it-IT", {
    timeZone: tz,
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).format(date);
}
function updateClocks(){
  const now = new Date();
  const itEl  = document.getElementById("clock-it");
  const dstEl = document.getElementById("clock-dst");
  const dstLb = document.getElementById("clock-dst-label");
  const dstWr = document.getElementById("clock-dst-wrap");
  if(itEl) itEl.textContent = fmtClock(now, "Europe/Rome");

  // Determine which country to show as the "destination" clock:
  // - If a day detail is open, show that day's country
  // - Otherwise show the primary destination of the trip
  const country = activeDestination();
  if(country && country.tz && country.tz !== "Europe/Rome"){
    if(dstEl) dstEl.textContent = fmtClock(now, country.tz);
    if(dstLb) dstLb.textContent = country.code;
    if(dstWr) dstWr.style.display = "";
    const sep = document.getElementById("clock-dst-sep");
    if(sep) sep.style.display = "";
  }else{
    if(dstWr) dstWr.style.display = "none";
    const sep = document.getElementById("clock-dst-sep");
    if(sep) sep.style.display = "none";
  }
}
function startClocks(){
  updateClocks();
  const now = new Date();
  const msToNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
  setTimeout(()=>{
    updateClocks();
    setInterval(updateClocks, 60000);
  }, msToNextMinute);
  document.addEventListener("visibilitychange", ()=>{
    if(!document.hidden) updateClocks();
  });
}

// === TOPTICK DATE (sticky bar at the top) ===
function renderTodayBanner(){
  const el = $("toptick-date");
  if(!el) return;
  const now = TODAY || new Date();
  // Compact format for the sticky bar: "Sab" + "9 maggio"
  const wd = now.toLocaleDateString("it-IT", { weekday: "short" }).replace(/\.$/, "");
  const date = now.toLocaleDateString("it-IT", { day: "numeric", month: "long" });
  el.innerHTML = `<b>${htmlEscape(wd)}</b> ${htmlEscape(date)}`;
}

function renderHome(){
  // Update app bar with current trip metadata
  const t = $("appbar-title"), ts = $("appbar-title-sub"), sub = $("appbar-sub"), edit = $("appbar-edit");
  if(t)   t.textContent  = TRIP.title || "Imposta il viaggio";

  // Update hero block
  const heroEyebrow = $("hero-eyebrow"), heroTitle = $("hero-title"), heroZh = $("hero-zh");
  if(isTripConfigured()){
    const dests = tripDestinations();
    const cityList = dests.length > 0 ? dests.map(d=>d.city).join(" · ") : (TRIP.title || "");
    if(heroEyebrow) heroEyebrow.textContent = formatTripDateRange();

  const list = $("day-list");

  // CASE 1: trip not configured yet
  if(!isTripConfigured()){
    if(sub) sub.textContent = IS_ADMIN ? "tocca per configurare" : "nessun viaggio attivo";
    if(cd){
      cd.innerHTML = IS_ADMIN
        ? `<button class="hero-cta" onclick="openTripEditor()">
             <span class="hero-cta-icon">＋</span>

    }

  }

  // CASE 2: trip configured but no days yet
  const start = dateOf(TRIP.startDate), end = dateOf(TRIP.endDate);

  if(today){
    cd.innerHTML = `<span class="countdown-num">${today.n}</span><span><b>Oggi</b> · ${today.dayLabel}<br>${htmlEscape(today.title || "")}</span>`;

    sub.textContent = "in attesa";
  }else if(TODAY > end){
    cd.innerHTML = `<span class="countdown-num">✓</span><span>Viaggio concluso<br>Buon ritorno</span>`;
    sub.textContent = "concluso";
  }else{
    cd.innerHTML = `<span class="countdown-num">·</span><span>In viaggio<br>${TODAY.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}</span>`;

  if(DAYS.length === 0){
    list.innerHTML = IS_ADMIN
      ? `<div class="empty-state">
           <h3>Il viaggio non ha ancora giorni</h3>
           <p>Inizia ad aggiungere il primo giorno: data, paese di destinazione, titolo della giornata.</p>

  // CASE 3: normal — render the day cards
  list.innerHTML = DAYS.map(d=>{

          ${ticketUrl?`<button class="btn btn-ticket" onclick="showTicket('${jsEnc(ticketKey(dayN, s.name))}','${jsEnc(s.name)}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 9a3 3 0 013-3h14a3 3 0 013 3v2a2 2 0 100 4v2a3 3 0 01-3 3H5a3 3 0 01-3-3v-2a2 2 0 100-4V9z"/><line x1="13" y1="5" x2="13" y2="19" stroke-dasharray="2 2"/></svg>
            Biglietto
          </button>`:""}
        </div>
        ${adminStrip}
      </div>
    </div>`;
}


renderHome();

startClocks();
